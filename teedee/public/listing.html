<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดประกาศ — อยู่ใจ (yoojai.com)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="breadcrumb" id="crumb"></div>
    <div class="detail-wrap" id="wrap">
      <div class="skeleton" style="height:460px"></div>
      <div class="skeleton" style="height:300px"></div>
    </div>

    <section class="section" id="similarSec" style="display:none;padding-top:0">
      <div class="section-head">
        <div><h2>ประกาศใกล้เคียง</h2><p>ที่คุณอาจสนใจ</p></div>
      </div>
      <div class="grid" id="similar"></div>
    </section>
  </div>

  <div id="footer"></div>

  <script src="/js/shared.js"></script>
  <script>
    TD.chrome('');

    const id = Number(location.pathname.split('/').pop());

    function specChip(ic, text) {
      return `<span class="spec" style="font-size:.9rem;padding:8px 13px">${TD.icons[ic]} ${text}</span>`;
    }

    async function load() {
      let data;
      try {
        const r = await fetch('/api/listings/' + id);
        if (!r.ok) throw new Error();
        data = await r.json();
      } catch {
        document.getElementById('wrap').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">${TD.icons.mapSearch}
            <h3 style="font-family:var(--font-display)">ไม่พบประกาศนี้</h3>
            <p>ประกาศอาจถูกปิดไปแล้ว</p>
            <a class="btn btn-primary" href="/search" style="margin-top:16px">ดูประกาศอื่น</a>
          </div>`;
        return;
      }
      const l = data.item;
      document.title = `${l.title} — ${TD.brand.main}${TD.brand.accent}`;
      TD.pushRecent(l.id);

      document.getElementById('crumb').innerHTML = `
        <a href="/">หน้าแรก</a> › <a href="/search?type=${l.listing_type}">${TD.typeLabel[l.listing_type]}</a>
        › <a href="/search?category=${l.category}">${TD.catLabel[l.category]}</a> › <span>${TD.esc(l.title)}</span>`;

      const imgs = l.images || [];
      const specs = [];
      if (l.bedrooms > 0) specs.push(specChip('bed', `${l.bedrooms} ห้องนอน`));
      if (l.bathrooms > 0) specs.push(specChip('bath', `${l.bathrooms} ห้องน้ำ`));
      if (Number(l.area_sqm) > 0) specs.push(specChip('ruler', `${Number(l.area_sqm)} ตร.ม.`));
      if (Number(l.land_area_sqwah) > 0) specs.push(specChip('land', `ที่ดิน ${Number(l.land_area_sqwah)} ตร.ว.`));
      if (l.floor_text) specs.push(specChip('stairs', `ชั้น ${TD.esc(l.floor_text)}`));
      specs.push(specChip(l.pets_allowed ? 'paw' : 'ban', l.pets_allowed ? 'เลี้ยงสัตว์ได้' : 'ไม่อนุญาตสัตว์เลี้ยง'));

      const nearby = (l.nearby || []).map(n =>
        `<div class="hl-item"><span class="pill-near">ใกล้</span> ${TD.esc(n.label)} <span style="color:var(--muted)">(${TD.esc(n.dist)})</span></div>`).join('');
      const highlights = (l.highlights || []).map(h =>
        `<div class="hl-item">${TD.icons.check} ${TD.esc(h)}</div>`).join('');

      document.getElementById('wrap').innerHTML = `
      <div>
        <div class="gallery">
          <div class="main" style="position:relative">
            <img id="mainImg" src="${TD.esc(imgs[0] || '')}" alt="${TD.esc(l.title)}">
            <button class="fav-btn ${TD.favs().includes(Number(l.id)) ? 'on' : ''}" data-fav="${l.id}" type="button" aria-label="บันทึกรายการโปรด" style="width:42px;height:42px">${TD.icons.heart}</button>
          </div>
          ${imgs.length > 1 ? `<div class="thumbs" id="thumbs">${imgs.map((im, i) =>
            `<img src="${TD.esc(im)}" class="${i === 0 ? 'active' : ''}" data-src="${TD.esc(im)}" alt="รูปที่ ${i + 1}">`).join('')}</div>` : ''}
        </div>
        <div class="detail-title">
          <h1>${TD.esc(l.title)}</h1>
          <div class="loc">${TD.icons.pin} ${TD.esc(l.location_text)}${l.province && !String(l.location_text).includes(l.province) ? ' · ' + TD.esc(l.province) : ''}</div>
          <div class="meta-line">เปิดดู ${Number(l.views).toLocaleString('th-TH')} ครั้ง · ลงประกาศเมื่อ ${new Date(l.created_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
        </div>
        <div class="detail-specs">${specs.join('')}</div>
        <div class="detail-section">
          <h2>รายละเอียด</h2>
          <p class="desc">${TD.esc(l.description)}</p>
        </div>
        ${highlights ? `<div class="detail-section"><h2>จุดเด่น</h2><div class="hl-list">${highlights}</div></div>` : ''}
        ${nearby ? `<div class="detail-section"><h2>สถานที่ใกล้เคียง</h2><div class="hl-list">${nearby}</div></div>` : ''}
      </div>

      <div class="sidebar">
        <div class="price-card">
          <div class="lbl">${l.listing_type === 'rent' ? 'ค่าเช่า' : 'ราคาขาย'}</div>
          <div class="p">${TD.price(l.price, l.listing_type)}${l.listing_type === 'rent' ? '<span class="per"> /เดือน</span>' : ''}</div>
          ${l.listing_type === 'sale' ? `<div class="per">≈ ฿${Number(l.price).toLocaleString('th-TH')}</div>` : ''}
        </div>
        ${l.listing_type === 'sale' ? `
        <div class="calc-card">
          <h3 style="display:flex;align-items:center;gap:8px">${TD.icons.calc} คำนวณผ่อนต่อเดือน</h3>
          <p class="note">ประเมินเบื้องต้นจากราคาประกาศ ${TD.price(l.price, 'sale')}</p>
          <div class="calc-row">
            <div class="lbl"><span>เงินดาวน์</span><b id="dpVal"></b></div>
            <input type="range" id="dpRange" min="0" max="50" step="5" value="10">
          </div>
          <div class="calc-row">
            <div class="lbl"><span>ดอกเบี้ยต่อปี</span><b id="irVal"></b></div>
            <input type="range" id="irRange" min="2" max="9" step="0.25" value="6">
          </div>
          <div class="calc-row">
            <div class="lbl"><span>ระยะเวลากู้</span><b id="yrVal"></b></div>
            <input type="range" id="yrRange" min="5" max="40" step="5" value="30">
          </div>
          <div class="calc-result"><span class="t">ผ่อนประมาณ</span><span class="v" id="monthly"></span></div>
          <p class="calc-sub">ตัวเลขโดยประมาณเพื่อการตัดสินใจเบื้องต้นเท่านั้น เงื่อนไขจริงขึ้นอยู่กับธนาคารและผู้กู้แต่ละราย</p>
        </div>` : ''}
        <div class="contact-card">
          <h3>สนใจประกาศนี้? ทักหาเราเลย</h3>
          ${(l.contact_phone || l.contact_line) ? `
          <div class="direct-contact">
            ${l.contact_phone ? `<a class="dc-phone" href="tel:${TD.esc(l.contact_phone)}">${TD.icons.phone} โทร ${TD.esc(l.contact_phone)}</a>` : ''}
            ${l.contact_line ? `<a class="dc-line" href="https://line.me/R/ti/p/~${encodeURIComponent(l.contact_line)}" target="_blank" rel="noopener">💬 แอด LINE: ${TD.esc(l.contact_line)}</a>` : ''}
          </div>
          <div class="or-sep">หรือฝากข้อความไว้</div>` : ''}
          <div class="frm">
            <input id="c-name" placeholder="ชื่อของคุณ *">
            <input id="c-phone" placeholder="เบอร์โทร">
            <input id="c-line" placeholder="LINE ID">
            <textarea id="c-msg" placeholder="ข้อความ เช่น ขอนัดดูห้องวันเสาร์นี้"></textarea>
            <div class="form-msg" id="formMsg"></div>
            <button class="btn btn-primary" id="sendBtn" style="justify-content:center">${TD.icons.phone} ส่งข้อความติดต่อ</button>
            <p style="font-size:.78rem;color:var(--muted);text-align:center">ทีมงานจะส่งต่อให้ผู้ดูแลทรัพย์ติดต่อกลับโดยเร็ว</p>
          </div>
          <div class="share-row">
            <button type="button" id="copyLink">${TD.icons.copy} คัดลอกลิงก์</button>
            <a href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}" target="_blank" rel="noopener">💬 แชร์ LINE</a>
            <button type="button" id="shareBtn">${TD.icons.share} แชร์</button>
          </div>
        </div>
      </div>`;

      // ---- Loan calculator ----
      if (l.listing_type === 'sale') {
        const P = Number(l.price) || 0;
        const fmt = (n) => '฿' + Math.round(n).toLocaleString('th-TH');
        function paintRange(el) {
          const pct = (el.value - el.min) / (el.max - el.min) * 100;
          el.style.setProperty('--fill', pct + '%');
        }
        function calc() {
          const dp = Number(dpRange.value), ir = Number(irRange.value), yr = Number(yrRange.value);
          document.getElementById('dpVal').textContent = dp + '% (' + fmt(P * dp / 100) + ')';
          document.getElementById('irVal').textContent = ir.toFixed(2) + '%';
          document.getElementById('yrVal').textContent = yr + ' ปี';
          const loan = P * (1 - dp / 100), r = ir / 100 / 12, n = yr * 12;
          const m = r === 0 ? loan / n : loan * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
          document.getElementById('monthly').textContent = fmt(m) + '/เดือน';
          [dpRange, irRange, yrRange].forEach(paintRange);
        }
        const dpRange = document.getElementById('dpRange'),
              irRange = document.getElementById('irRange'),
              yrRange = document.getElementById('yrRange');
        [dpRange, irRange, yrRange].forEach(el => el.addEventListener('input', calc));
        calc();
      }

      // ---- Share ----
      document.getElementById('copyLink').addEventListener('click', async () => {
        const btn = document.getElementById('copyLink');
        try {
          await navigator.clipboard.writeText(location.href);
          btn.textContent = '✓ คัดลอกแล้ว';
          setTimeout(() => { btn.innerHTML = TD.icons.copy + ' คัดลอกลิงก์'; }, 1800);
        } catch { prompt('คัดลอกลิงก์นี้:', location.href); }
      });
      document.getElementById('shareBtn').addEventListener('click', () => {
        if (navigator.share) navigator.share({ title: l.title, url: location.href }).catch(() => {});
        else document.getElementById('copyLink').click();
      });

      // Gallery switch
      const thumbs = document.getElementById('thumbs');
      if (thumbs) thumbs.addEventListener('click', e => {
        const im = e.target.closest('img[data-src]'); if (!im) return;
        document.getElementById('mainImg').src = im.dataset.src;
        thumbs.querySelectorAll('img').forEach(x => x.classList.remove('active'));
        im.classList.add('active');
      });

      // Contact form
      document.getElementById('sendBtn').addEventListener('click', async () => {
        const msg = document.getElementById('formMsg');
        msg.className = 'form-msg';
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        try {
          await TD.post('/api/inquiries', {
            listing_id: l.id,
            name: document.getElementById('c-name').value.trim(),
            phone: document.getElementById('c-phone').value.trim(),
            line_id: document.getElementById('c-line').value.trim(),
            message: document.getElementById('c-msg').value.trim()
          });
          msg.textContent = 'ส่งข้อความเรียบร้อย รอการติดต่อกลับได้เลยครับ';
          msg.classList.add('ok');
          ['c-name', 'c-phone', 'c-line', 'c-msg'].forEach(i => document.getElementById(i).value = '');
        } catch (e2) {
          msg.textContent = e2.message;
          msg.classList.add('err');
        } finally { btn.disabled = false; }
      });

      // Similar
      if (data.similar?.length) {
        document.getElementById('similarSec').style.display = 'block';
        document.getElementById('similar').innerHTML = data.similar.map(s => TD.card(s)).join('');
      }
    }
    load();
  </script>
</body>
</html>
