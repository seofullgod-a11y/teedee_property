<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var d=document.documentElement,t=localStorage.getItem("yj_theme");d.dataset.theme=t==="dark"?"dark":"light";var l=localStorage.getItem("yj_lang");d.lang=l==="en"?"en":"th";d.dataset.lang=d.lang;}catch(e){}})();</script>
  <title>รายละเอียดประกาศ — อยู่ใจ (yoojai.com)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=15">
  <link rel="icon" href="/favicon">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="breadcrumb" id="crumb"></div>
    <div id="page">
      <div class="detail-wrap">
        <div class="skeleton" style="height:460px"></div>
        <div class="skeleton" style="height:300px"></div>
      </div>
    </div>

    <section class="section" id="similarSec" style="display:none;padding-top:0">
      <div class="section-head">
        <div>
          <span class="eyebrow-text">You May Also Like</span>
          <h2>ประกาศใกล้เคียง</h2>
        </div>
      </div>
      <div class="grid" id="similar"></div>
    </section>
  </div>

  <div id="footer"></div>

  <!-- Lightbox -->
  <div class="lb" id="lb" hidden>
    <button class="lb-close" id="lbClose" aria-label="ปิด">✕</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="รูปก่อนหน้า">‹</button>
    <img id="lbImg" alt="">
    <button class="lb-nav lb-next" id="lbNext" aria-label="รูปถัดไป">›</button>
    <div class="lb-count" id="lbCount"></div>
  </div>

  <script src="/js/shared.js?v=15"></script>
  <script>
    TD.chrome('');
    const id = Number(location.pathname.split('/').pop());
    const $ = (x) => document.getElementById(x);

    function specChip(ic, text) {
      return `<span class="spec" style="font-size:.9rem;padding:8px 13px">${TD.icons[ic]} ${text}</span>`;
    }

    function factsSection(l) {
      const rows = [];
      const add = (k, v) => v && rows.push(`<div class="fact-row"><span class="k">${k}</span><span class="v">${v}</span></div>`);
      add('รหัสประกาศ', 'YJ-' + String(l.id).padStart(5, '0'));
      add('ประเภททรัพย์', TD.catLabel[l.category]);
      add('รูปแบบ', l.listing_type === 'rent' ? 'ให้เช่า' : 'ขาย');
      if (Number(l.area_sqm) > 0) add('พื้นที่ใช้สอย', Number(l.area_sqm) + ' ตร.ม.');
      if (Number(l.land_area_sqwah) > 0) add('ขนาดที่ดิน', Number(l.land_area_sqwah) + ' ตร.ว.');
      if (l.floor_text) add('ชั้น', TD.esc(l.floor_text));
      if (l.year_built) add('ปีที่สร้างเสร็จ', l.year_built + ' (อายุ ' + Math.max(0, new Date().getFullYear() - l.year_built) + ' ปี)');
      if (l.common_fee_text) add('ค่าส่วนกลาง', TD.esc(l.common_fee_text));
      if (l.listing_type === 'rent' && Number(l.area_sqm) > 0)
        add('ราคาต่อ ตร.ม.', '฿' + Math.round(l.price / Number(l.area_sqm)).toLocaleString('th-TH') + '/เดือน');
      if (l.listing_type === 'sale' && Number(l.area_sqm) > 0)
        add('ราคาต่อ ตร.ม.', '฿' + Math.round(l.price / Number(l.area_sqm)).toLocaleString('th-TH'));
      add('สัตว์เลี้ยง', l.pets_allowed ? 'เลี้ยงได้' : 'ไม่อนุญาต');
      add('ลงประกาศเมื่อ', new Date(l.created_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }));
      if (!rows.length) return '';
      return `<div class="detail-section reveal"><h2>ข้อมูลทรัพย์</h2><div class="facts-grid">${rows.join('')}</div></div>`;
    }
    function checkSection(title, items) {
      if (!items || !items.length) return '';
      return `<div class="detail-section reveal"><h2>${title}</h2><div class="amen-grid">
        ${items.map(x => `<div class="amen-item"><span class="ai-check">${TD.icons.check}</span>${TD.esc(x)}</div>`).join('')}
      </div></div>`;
    }

    function mapSection(l) {
      const hasCoord = Number(l.latitude) && Number(l.longitude);
      const mapQ = hasCoord
        ? `${Number(l.latitude)},${Number(l.longitude)}`
        : [l.location_text, l.province].filter(Boolean).join(' ');
      if (!mapQ) return '';
      const embed = `https://www.google.com/maps?q=${encodeURIComponent(mapQ)}&z=${hasCoord ? 16 : 14}&output=embed`;
      const navUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapQ)}`;
      return `
      <div class="detail-section reveal">
        <h2>ตำแหน่งที่ตั้ง</h2>
        <div class="map-wrap"><iframe src="${embed}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen title="แผนที่"></iframe></div>
        <div class="map-actions">
          <a href="${navUrl}" target="_blank" rel="noopener">${TD.icons.pin} เปิดใน Google Maps</a>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(mapQ)}" target="_blank" rel="noopener">${TD.icons.arrowRight} นำทางไปที่นี่</a>
        </div>
        ${!hasCoord ? '<p style="font-size:.78rem;color:var(--muted);margin-top:10px">* ตำแหน่งโดยประมาณจากชื่อทำเล</p>' : ''}
      </div>`;
    }

    // ================= ใต้แมพ: 4 ระบบ =================
    const NB_CATS = [
      { key: 'transport', label: 'การเดินทาง', ic: 'transit', re: /(BTS|MRT|ARL|รถไฟ|สถานี|แอร์พอร์ต|สนามบิน|ทางด่วน|มอเตอร์เวย์|ท่าเรือ|ขนส่ง|บขส|วิน|ป้ายรถ|bus|station|airport)/i },
      { key: 'shopping', label: 'ช้อปปิ้ง', ic: 'store', re: /(ห้าง|เซ็นทรัล|central|โลตัส|lotus|บิ๊กซี|bigc|แม็คโคร|makro|ตลาด|มาร์เก็ต|market|mall|เทสโก้|ช้อป|community|พลาซ่า|plaza|ไอคอน|เดอะมอลล์|robinson|โรบินสัน)/i },
      { key: 'health', label: 'สุขภาพ', ic: 'health', re: /(โรงพยาบาล|รพ\.|คลินิก|hospital|clinic|เภสัช|ร้านยา|ทันตกรรม|เมดิคอล|medical|health)/i },
      { key: 'education', label: 'การศึกษา', ic: 'edu', re: /(โรงเรียน|มหาวิทยาลัย|มหา.?ลัย|วิทยาลัย|school|university|college|campus|สถาบัน|อนุบาล|เนอสเซอรี่|international)/i },
      { key: 'lifestyle', label: 'ไลฟ์สไตล์', ic: 'leisure', re: /.*/ }
    ];
    function categorizeNearby(nearby) {
      const groups = {};
      for (const n of (nearby || [])) {
        const cat = NB_CATS.find(c => c.key !== 'lifestyle' && c.re.test(n.label)) || NB_CATS[NB_CATS.length - 1];
        (groups[cat.key] = groups[cat.key] || []).push(n);
      }
      return groups;
    }

    function exploreAreaSection(l) {
      const hasNearby = (l.nearby || []).length > 0;
      const prov = l.province || '';
      if (!hasNearby && !prov) return '';
      const groups = categorizeNearby(l.nearby);
      const catHtml = NB_CATS.filter(c => groups[c.key]?.length).map(c => `
        <div class="nb-cat">
          <div class="nb-cat-head">${TD.icons[c.ic]} <span>${c.label}</span></div>
          <div class="nb-cat-list">${groups[c.key].map(n =>
            `<div class="nb-place"><span>${TD.esc(n.label)}</span><b>${TD.esc(n.dist)}</b></div>`).join('')}</div>
        </div>`).join('');

      return `
      <div class="detail-section reveal explore-area">
        <h2>สำรวจย่านนี้</h2>
        ${prov ? `
        <div class="area-insight" id="areaInsight" data-prov="${TD.esc(prov)}">
          <span class="ai-badge">${TD.icons.sparkles} AI วิเคราะห์ทำเล</span>
          <p id="areaInsightText" class="ai-loading">กำลังวิเคราะห์ย่าน${TD.esc(prov)}…</p>
        </div>` : ''}
        ${catHtml ? `<div class="nb-cats">${catHtml}</div>` : ''}
        ${prov ? `<a class="area-cta" href="/area/${encodeURIComponent(prov)}">${TD.icons.mapSearch} ดูอสังหาฯ ทั้งหมดใน${TD.esc(prov)} <span class="ac-arrow">${TD.icons.arrowRight}</span></a>` : ''}
      </div>`;
    }

    // ---- ฮับยอดนิยม (พิกัดคงที่) สำหรับประเมินระยะเส้นตรงแบบฟรี ----
    const HUBS = [
      { name: 'สนามบินสุวรรณภูมิ', lat: 13.6900, lng: 100.7501 },
      { name: 'สนามบินดอนเมือง', lat: 13.9126, lng: 100.6068 },
      { name: 'สยาม / ใจกลางกรุงเทพฯ', lat: 13.7460, lng: 100.5340 },
      { name: 'สถานีกลางกรุงเทพอภิวัฒน์', lat: 13.8027, lng: 100.5397 }
    ];
    function haversineKm(la1, lo1, la2, lo2) {
      const R = 6371, toR = x => x * Math.PI / 180;
      const dLa = toR(la2 - la1), dLo = toR(lo2 - lo1);
      const s = Math.sin(dLa / 2) ** 2 + Math.cos(toR(la1)) * Math.cos(toR(la2)) * Math.sin(dLo / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }
    function commuteSection(l) {
      const lat = Number(l.latitude), lng = Number(l.longitude);
      if (!lat || !lng) return '';
      const rows = HUBS.map(h => {
        const km = haversineKm(lat, lng, h.lat, h.lng);
        const dir = `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${h.lat},${h.lng}`;
        return `<div class="cm-row">
          <span class="cm-name">${TD.icons.pin} ${TD.esc(h.name)}</span>
          <span class="cm-dist">${km < 10 ? km.toFixed(1) : Math.round(km)} กม.</span>
          <a class="cm-go" href="${dir}" target="_blank" rel="noopener">ดูเส้นทาง</a>
        </div>`;
      }).join('');
      return `
      <div class="detail-section reveal commute-sec">
        <h2>เวลา/ระยะเดินทางจากที่นี่</h2>
        <div class="cm-list">${rows}</div>
        <div class="cm-custom">
          <input id="cmInput" placeholder="พิมพ์จุดหมาย เช่น ที่ทำงาน มหาวิทยาลัย…">
          <button class="btn" id="cmBtn" type="button">${TD.icons.route} ดูเส้นทาง</button>
        </div>
        <p class="cm-note">* ระยะเป็นเส้นตรงโดยประมาณ — กด "ดูเส้นทาง" เพื่อดูเวลาจริงและเส้นทางขับรถใน Google Maps</p>
      </div>`;
    }

    function viewingSection(l) {
      const today = new Date().toISOString().slice(0, 10);
      return `
      <div class="detail-section reveal viewing-sec">
        <div class="vw-card">
          <div class="vw-head">${TD.icons.calendar}<div><h2 style="border:0;padding:0;margin:0">นัดชมสถานที่จริง</h2><p>เลือกวัน-เวลาที่สะดวก ทีมงานจะยืนยันนัดกลับโดยเร็ว</p></div></div>
          <div class="vw-grid">
            <label>วันที่<input type="date" id="vwDate" min="${today}"></label>
            <label>ช่วงเวลา<select id="vwTime">
              <option value="ช่วงเช้า (09:00–12:00)">ช่วงเช้า (09:00–12:00)</option>
              <option value="ช่วงบ่าย (12:00–15:00)">ช่วงบ่าย (12:00–15:00)</option>
              <option value="ช่วงเย็น (15:00–18:00)">ช่วงเย็น (15:00–18:00)</option>
              <option value="ยืดหยุ่นได้">ยืดหยุ่นได้ / แล้วแต่สะดวก</option>
            </select></label>
            <label>ชื่อ<input id="vwName" placeholder="ชื่อของคุณ *"></label>
            <label>เบอร์/LINE<input id="vwContact" placeholder="เบอร์โทร หรือ LINE ID *"></label>
          </div>
          <div class="form-msg" id="vwMsg"></div>
          <button class="btn btn-primary" id="vwBtn" style="justify-content:center;width:100%">${TD.icons.calendar} ขอนัดเข้าชม</button>
        </div>
      </div>`;
    }

    function sameAreaSection(l) {
      if (!l.province) return '';
      return `<div class="detail-section reveal same-area-sec" id="sameAreaSec" style="display:none">
        <div class="sa-head"><h2>ทรัพย์อื่นใน${TD.esc(l.province)}</h2>
          <a class="sa-all" href="/area/${encodeURIComponent(l.province)}">ดูทั้งหมด ${TD.icons.arrowRight}</a></div>
        <div class="grid" id="sameAreaGrid"></div>
      </div>`;
    }

    function initBelowMap(l) {
      // 1) AI วิเคราะห์ย่าน
      const ai = $('areaInsight');
      if (ai && l.province) {
        fetch('/api/area-insight?province=' + encodeURIComponent(l.province))
          .then(r => r.json())
          .then(d => {
            const el = $('areaInsightText');
            if (!el) return;
            if (d.insight) { el.textContent = d.insight; el.classList.remove('ai-loading'); }
            else { ai.style.display = 'none'; }
          }).catch(() => { const el = $('areaInsightText'); if (el) el.parentElement.style.display = 'none'; });
      }

      // 3) เดินทาง — ปุ่มจุดหมายกำหนดเอง
      const cmBtn = $('cmBtn'), cmInput = $('cmInput');
      if (cmBtn && cmInput) {
        const go = () => {
          const q = cmInput.value.trim();
          if (!q) { cmInput.focus(); return; }
          const lat = Number(l.latitude), lng = Number(l.longitude);
          window.open(`https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${encodeURIComponent(q)}`, '_blank', 'noopener');
        };
        cmBtn.addEventListener('click', go);
        cmInput.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
      }

      // 2) นัดชมสถานที่
      const vwBtn = $('vwBtn');
      if (vwBtn) {
        vwBtn.addEventListener('click', async () => {
          const date = $('vwDate').value, time = $('vwTime').value;
          const name = $('vwName').value.trim(), contact = $('vwContact').value.trim();
          const msg = $('vwMsg');
          if (!date) { msg.textContent = 'กรุณาเลือกวันที่'; msg.className = 'form-msg err'; return; }
          if (!name || !contact) { msg.textContent = 'กรุณากรอกชื่อ และเบอร์/LINE'; msg.className = 'form-msg err'; return; }
          const isPhone = /[0-9]{6,}/.test(contact.replace(/[^0-9]/g, ''));
          vwBtn.disabled = true; msg.textContent = 'กำลังส่ง…'; msg.className = 'form-msg';
          try {
            const dateTxt = new Date(date).toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            await TD.post('/api/inquiries', {
              listing_id: l.id, name,
              phone: isPhone ? contact : '', line_id: isPhone ? '' : contact,
              message: `📅 ขอนัดเข้าชมสถานที่: ${dateTxt} · ${time}`
            });
            document.querySelector('.viewing-sec .vw-card').innerHTML =
              `<div class="vw-success">${TD.icons.check}<h3>ส่งคำขอนัดชมแล้ว!</h3><p>ทีมงานจะติดต่อยืนยันนัด <b>${TD.esc(dateTxt)} · ${TD.esc(time)}</b> กลับโดยเร็วครับ</p></div>`;
          } catch (e) {
            vwBtn.disabled = false; msg.textContent = e.message || 'ส่งไม่สำเร็จ ลองใหม่อีกครั้ง'; msg.className = 'form-msg err';
          }
        });
      }

      // 4) ทรัพย์อื่นในทำเลเดียวกัน
      if (l.province) {
        fetch(`/api/listings-in-area?province=${encodeURIComponent(l.province)}&exclude=${l.id}`)
          .then(r => r.json())
          .then(d => {
            const items = (d.items || []).slice(0, 3);
            if (!items.length) return;
            $('sameAreaGrid').innerHTML = items.map(s => TD.card(s)).join('');
            $('sameAreaSec').style.display = 'block';
            initReveal();
          }).catch(() => {});
      }
    }

    // ================= Load & Render =================
    let L = null;
    async function load() {
      let data;
      try {
        const r = await fetch('/api/listings/' + id);
        if (!r.ok) throw new Error();
        data = await r.json();
      } catch {
        $('page').innerHTML = `
          <div class="empty-state">${TD.icons.mapSearch}
            <h3 style="font-family:var(--font-display)">ไม่พบประกาศนี้</h3>
            <p>ประกาศอาจถูกปิดไปแล้ว</p>
            <a class="btn btn-primary" href="/search" style="margin-top:16px">ดูประกาศอื่น</a>
          </div>`;
        return;
      }
      const l = L = data.item;
      document.title = `${l.title} — ${TD.brand.main}${TD.brand.accent}`;
      TD.pushRecent(l.id);

      $('crumb').innerHTML = `
        <a href="/">หน้าแรก</a> › <a href="/search?type=${l.listing_type}">${TD.typeLabel[l.listing_type]}</a>
        › <a href="/search?category=${l.category}">${TD.catLabel[l.category]}</a> › <span>${TD.esc(l.title)}</span>`;

      const imgs = (l.images || []).filter(Boolean);
      const specs = [];
      if (l.bedrooms > 0) specs.push(specChip('bed', `${l.bedrooms} ห้องนอน`));
      if (l.bathrooms > 0) specs.push(specChip('bath', `${l.bathrooms} ห้องน้ำ`));
      if (Number(l.area_sqm) > 0) specs.push(specChip('ruler', `${Number(l.area_sqm)} ตร.ม.`));
      if (Number(l.land_area_sqwah) > 0) specs.push(specChip('land', `ที่ดิน ${Number(l.land_area_sqwah)} ตร.ว.`));
      if (l.floor_text) specs.push(specChip('stairs', `ชั้น ${TD.esc(l.floor_text)}`));
      specs.push(specChip(l.pets_allowed ? 'paw' : 'ban', l.pets_allowed ? 'เลี้ยงสัตว์ได้' : 'ไม่อนุญาตสัตว์เลี้ยง'));

      const nearby = (l.nearby || []).map(n =>
        `<div class="hl-item"><span class="pill-near">ใกล้</span> ${TD.esc(n.label)} <span style="color:var(--muted)">(${TD.esc(n.dist)})</span></div>`).join('');
      const highlights = (l.highlights || []).map(h =>
        `<div class="hl-item">${TD.icons.check} ${TD.esc(h)}</div>`).join('');

      // ---- Gallery (grid สไตล์ Airbnb) ----
      const faved = TD.favs().includes(Number(l.id));
      let galleryHtml;
      if (imgs.length >= 3) {
        galleryHtml = `
        <div class="g-grid" id="gallery">
          <div class="g-item g-main" data-i="0"><img src="${TD.esc(imgs[0])}" alt="${TD.esc(l.title)}"></div>
          <div class="g-item" data-i="1"><img src="${TD.esc(imgs[1])}" alt="รูปที่ 2" loading="lazy"></div>
          <div class="g-item" data-i="2">
            <img src="${TD.esc(imgs[2])}" alt="รูปที่ 3" loading="lazy">
            ${imgs.length > 3 ? `<div class="g-more">+${imgs.length - 3} รูป</div>` : ''}
          </div>
          <button class="fav-btn ${faved ? 'on' : ''}" data-fav="${l.id}" type="button" aria-label="บันทึกรายการโปรด" style="width:42px;height:42px">${TD.icons.heart}</button>
          <button class="g-all" id="gAll" type="button">${TD.icons.copy} ดูรูปทั้งหมด (${imgs.length})</button>
        </div>`;
      } else {
        galleryHtml = `
        <div class="g-grid g-single" id="gallery">
          <div class="g-item g-main" data-i="0"><img src="${TD.esc(imgs[0] || '')}" alt="${TD.esc(l.title)}"></div>
          ${imgs[1] ? `<div class="g-item" data-i="1" style="grid-row:1/3"><img src="${TD.esc(imgs[1])}" alt="รูปที่ 2" loading="lazy"></div>` : ''}
          <button class="fav-btn ${faved ? 'on' : ''}" data-fav="${l.id}" type="button" aria-label="บันทึกรายการโปรด" style="width:42px;height:42px">${TD.icons.heart}</button>
          ${imgs.length > 1 ? `<button class="g-all" id="gAll" type="button">${TD.icons.copy} ดูรูปทั้งหมด (${imgs.length})</button>` : ''}
        </div>`;
      }

      $('page').innerHTML = `
      ${galleryHtml}
      <div class="detail-wrap" style="padding-top:26px">

    // ผูก event ของ lightbox ครั้งเดียวตอนโหลดหน้า — ไม่ขึ้นกับว่า gallery จะ render สำเร็จหรือไม่
    (function bindLightbox() {
      const lb = $('lb');
      // delegation: กดที่ไหนในกล่องดำ ถ้าเป็นปุ่มปิด/พื้นหลัง ให้ปิด; ปุ่มลูกศรให้เลื่อน
      lb.addEventListener('click', e => {
        if (e.target.closest('#lbClose') || e.target === lb) return closeLb();
        if (e.target.closest('#lbPrev')) return stepLb(-1);
        if (e.target.closest('#lbNext')) return stepLb(1);
      });
      document.addEventListener('keydown', e => {
        if ($('lb').hidden) return;
        if (e.key === 'Escape') closeLb();
        else if (e.key === 'ArrowLeft') stepLb(-1);
        else if (e.key === 'ArrowRight') stepLb(1);
      });
      // swipe บนมือถือ
      let tx = null;
      lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
      lb.addEventListener('touchend', e => {
        if (tx === null) return;
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 50) stepLb(dx > 0 ? -1 : 1);
        tx = null;
      }, { passive: true });
    })();

    function initGallery(imgs) {
      lbImgs = imgs || [];
      const g = $('gallery');
      if (!g) return;
      g.addEventListener('click', e => {
        if (e.target.closest('[data-fav]')) return;
        const all = e.target.closest('#gAll');
        const item = e.target.closest('.g-item');
        if (all) return openLb(0);
        if (item) openLb(Number(item.dataset.i) || 0);
      });
    }
    function openLb(i) {
      if (!lbImgs.length) return;
      lbIdx = i;
      $('lbImg').src = lbImgs[lbIdx];
      $('lbCount').textContent = `${lbIdx + 1} / ${lbImgs.length}`;
      $('lb').hidden = false;
      document.body.style.overflow = 'hidden';
    }
    function stepLb(d) {
      if (lbImgs.length < 2) return;
      lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length;
      const im = $('lbImg');
      im.style.opacity = '0';
      setTimeout(() => {
        im.src = lbImgs[lbIdx];
        $('lbCount').textContent = `${lbIdx + 1} / ${lbImgs.length}`;
        im.onload = () => { im.style.opacity = '1'; };
        im.style.opacity = '1';
      }, 130);
    }
    function closeLb() { $('lb').hidden = true; document.body.style.overflow = ''; }

    // ================= Loan calc =================
    function initCalc(l) {
      if (l.listing_type !== 'sale') return;
      const P = Number(l.price) || 0;
      const fmt = (n) => '฿' + Math.round(n).toLocaleString('th-TH');
      const dpRange = $('dpRange'), irRange = $('irRange'), yrRange = $('yrRange'), incRange = $('incRange');
      function paintRange(el) {
        const pct = (el.value - el.min) / (el.max - el.min) * 100;
        el.style.setProperty('--fill', pct + '%');
      }
      function calc() {
        const dp = Number(dpRange.value), ir = Number(irRange.value), yr = Number(yrRange.value);
        $('dpVal').textContent = dp + '% (' + fmt(P * dp / 100) + ')';
        $('irVal').textContent = ir.toFixed(2) + '%';
        $('yrVal').textContent = yr + ' ปี';
        const loan = P * (1 - dp / 100), r = ir / 100 / 12, n = yr * 12;
        const m = r === 0 ? loan / n : loan * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
        $('monthly').textContent = fmt(m) + '/เดือน';
        [dpRange, irRange, yrRange].forEach(paintRange);

        // สรุปยอด: เงินต้นกู้ / ดอกเบี้ยรวม / ยอดชำระทั้งหมด
        const totalPay = m * n, totalInterest = totalPay - loan;
        $('calcBreak').innerHTML = `
          <div class="bd-row"><span>ยอดกู้</span><b>${fmt(loan)}</b></div>
          <div class="bd-row"><span>ดอกเบี้ยรวมตลอดสัญญา</span><b>${fmt(totalInterest)}</b></div>
          <div class="bd-row total"><span>ชำระทั้งหมด (${yr} ปี)</span><b>${fmt(totalPay)}</b></div>`;

        // เช็กความสามารถผ่อน
        const inc = Number(incRange.value);
        $('incVal').textContent = fmt(inc);
        paintRange(incRange);
        const ratio = m / inc;
        const maxAfford = inc * 0.4;
        const v = $('affordVerdict');
        if (ratio <= 0.4) {
          v.className = 'afford-verdict ok';
          v.innerHTML = `${TD.icons.check} ผ่อนไหวสบาย — คิดเป็น ${Math.round(ratio * 100)}% ของรายได้`;
        } else if (ratio <= 0.55) {
          v.className = 'afford-verdict warn';
          v.innerHTML = `⚠️ ค่อนข้างตึง — คิดเป็น ${Math.round(ratio * 100)}% ของรายได้ (แนะนำเพิ่มดาวน์ หรือยืดงวด)`;
        } else {
          v.className = 'afford-verdict bad';
          v.innerHTML = `เกินกำลังผ่อน — งวดนี้ ${Math.round(ratio * 100)}% ของรายได้ (ธนาคารมักรับไม่เกินผ่อน ${fmt(maxAfford)}/เดือน)`;
        }
      }
      [dpRange, irRange, yrRange, incRange].forEach(el => el.addEventListener('input', calc));
      calc();
    }

    // ================= Scroll reveal =================
    function initReveal() {
      const els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) { els.forEach(el => el.classList.add('in')); return; }
      const io = new IntersectionObserver(entries => {
        entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
      }, { threshold: .1 });
      els.forEach(el => io.observe(el));
    }

    // ================= Chat widget =================
    let chatMsgs = [], aiMode = true, leadStep = null, lead = {};
    function initChat(l) {
      document.body.insertAdjacentHTML('beforeend', `
      <button class="chat-fab" id="chatFab" aria-label="แชทสอบถาม">

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9h8"/><path d="M8 13h6"/><path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12z"/></svg>

    function greet(l) {
      botSay(`สวัสดีครับ 👋 ยินดีต้อนรับสู่ประกาศ "${l.title}" — สงสัยอะไรถามได้เลยครับ หรือกดปุ่มด้านล่างเพื่อฝากข้อมูลให้ทีมงานติดต่อกลับ`);

        { t: '🚉 เดินทางสะดวกไหม', q: 'การเดินทางเป็นอย่างไรบ้าง' },

        { t: '📞 ฝากข้อมูลติดต่อ', lead: true }

    function renderChips(chips) {
      $('cpChips').innerHTML = chips.map((c, i) =>
        `<button data-ci="${i}">${TD.esc(c.t)}</button>`).join('');
      $('cpChips').onclick = e => {

        $('cpInput').value = c.q;
        sendChat();
      };
    }
    function addMsg(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      $('cpBody').appendChild(el);
      $('cpBody').scrollTop = $('cpBody').scrollHeight;
      return el;
    }
    function botSay(t) { addMsg('bot', t); chatMsgs.push({ role: 'assistant', content: t }); }
    function typing(on) {
      let t = $('cpTyping');
      if (on) {
        if (t) return;
        t = document.createElement('div');
        t.className = 'msg bot typing'; t.id = 'cpTyping';
        t.innerHTML = '<span></span><span></span><span></span>';
        $('cpBody').appendChild(t);
        $('cpBody').scrollTop = $('cpBody').scrollHeight;
      } else if (t) t.remove();
    }

    async function sendChat() {
      const inp = $('cpInput');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      addMsg('user', text);

      // อยู่ในขั้นตอนฝากข้อมูล
      if (leadStep) return leadNext(text);

      chatMsgs.push({ role: 'user', content: text });
      if (!aiMode) { // ไม่มี AI -> ชวนฝากข้อมูล
        botSay('ขอบคุณสำหรับคำถามครับ เพื่อให้ได้คำตอบที่ถูกต้องที่สุด รบกวนฝากข้อมูลติดต่อไว้ เดี๋ยวทีมงานตอบทุกคำถามเลยครับ');
        return startLead();
      }
      typing(true);
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ listing_id: L.id, messages: chatMsgs })
        });
        const j = await r.json();
        typing(false);
        if (j.reply) {
          botSay(j.reply);
        } else if (j.error) {
          botSay(j.error);
        } else { // fallback
          aiMode = false;
          botSay('ตอนนี้ผู้ช่วย AI ไม่พร้อมใช้งานชั่วคราว รบกวนฝากข้อมูลติดต่อไว้ เดี๋ยวทีมงานตอบทุกคำถามครับ');
          startLead();
        }
      } catch {
        typing(false);
        botSay('เครือข่ายขัดข้องชั่วคราว ลองอีกครั้ง หรือฝากข้อมูลติดต่อไว้ได้เลยครับ');
      }
    }

    // ---- Lead capture ในแชท ----
    function startLead() {

    async function leadNext(text) {
      if (leadStep === 'name') {
        lead.name = text.slice(0, 100);
        leadStep = 'contact';
        botSay(`ขอบคุณครับคุณ${lead.name} 😊 ขอเบอร์โทรหรือ LINE ID สำหรับติดต่อกลับครับ`);
        $('cpInput').placeholder = 'เบอร์โทร หรือ LINE ID...';
      } else if (leadStep === 'contact') {
        const v = text.slice(0, 80);
        if (/^[\d\s\-+()]{8,}$/.test(v)) lead.phone = v.replace(/\s/g, '');
        else lead.line_id = v;
        leadStep = 'note';
        botSay('รับทราบครับ มีอะไรอยากฝากถึงทีมงานเพิ่มไหมครับ เช่น เวลาที่สะดวกให้ติดต่อ หรือพิมพ์ "ไม่มี" เพื่อส่งเลย');
        $('cpInput').placeholder = 'ข้อความเพิ่มเติม หรือพิมพ์ ไม่มี...';
      } else if (leadStep === 'note') {
        lead.note = /^(ไม่มี|ไม่|no|-)\s*$/i.test(text) ? '' : text.slice(0, 500);
        leadStep = null;
        $('cpInput').placeholder = 'พิมพ์คำถาม...';
        typing(true);
        try {
          await TD.post('/api/inquiries', {
            listing_id: L.id,
            name: lead.name,
            phone: lead.phone || '',
            line_id: lead.line_id || '',
            message: '[จากแชท] ' + (lead.note || 'สนใจประกาศนี้ ขอให้ติดต่อกลับ')
          });
          typing(false);
          botSay(`เรียบร้อยครับ ✅ ทีมงานได้รับข้อมูลแล้ว จะรีบติดต่อกลับคุณ${lead.name} โดยเร็วที่สุดครับ ระหว่างนี้ถามอะไรเพิ่มได้เลย`);
        } catch (e) {
          typing(false);
          botSay('ขออภัยครับ ส่งข้อมูลไม่สำเร็จ (' + e.message + ') ลองใหม่อีกครั้ง หรือใช้ฟอร์มติดต่อด้านข้างได้ครับ');
        }
        renderChips([{ t: '📞 ฝากข้อมูลอีกครั้ง', lead: true }]);
      }
    }

    load();
  </script>
</body>
</html>
