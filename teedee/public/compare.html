<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var d=document.documentElement,t=localStorage.getItem("yj_theme");d.dataset.theme=t==="dark"?"dark":"light";var l=localStorage.getItem("yj_lang");d.lang=l==="en"?"en":"th";d.dataset.lang=d.lang;}catch(e){}})();</script>
  <title>เปรียบเทียบทรัพย์ — อยู่ใจ (yoojai.com)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=35">
  <link rel="icon" href="/favicon">
  <style>
    .cmp-cards { display: grid; grid-auto-columns: minmax(0, 1fr); grid-auto-flow: column; gap: 18px; margin-top: 24px; align-items: start; }
    @media (max-width: 820px) {
      .cmp-cards { grid-auto-flow: row; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    }
    @media (max-width: 560px) {
      .cmp-cards { grid-template-columns: 1fr; }
    }
    .cmp-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
    .cmp-card-media { position: relative; aspect-ratio: 16/11; background: var(--soft); }
    .cmp-card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cmp-noimg { width: 100%; height: 100%; background: linear-gradient(135deg, var(--soft), var(--line)); }
    .cmp-rm { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 999px; border: 0; background: rgba(0,0,0,.5); color: #fff; cursor: pointer; font-size: 14px; line-height: 1; display: grid; place-items: center; transition: background .15s; }
    .cmp-rm:hover { background: rgba(0,0,0,.78); }
    .cmp-badge { position: absolute; left: 10px; bottom: 10px; font-size: .7rem; font-weight: 500; color: #fff; background: rgba(20,19,15,.72); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); padding: 5px 11px; border-radius: 999px; }
    .cmp-card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; flex: 1; }
    .cmp-card-body h3 { font-size: .96rem; font-weight: 500; line-height: 1.45; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.7em; }
    .cmp-price { font-family: var(--font-display); font-weight: 600; font-size: 1.4rem; color: var(--gold); margin-bottom: 14px; }
    .cmp-price span { font-size: .8rem; color: var(--muted); font-weight: 400; }
    .cmp-specs { display: flex; flex-direction: column; margin: 0 0 16px; }
    .cmp-spec { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line); }
    .cmp-spec:first-child { border-top: 0; }
    .cmp-spec dt { font-size: .82rem; color: var(--muted); flex-shrink: 0; }
    .cmp-spec dd { font-size: .9rem; color: var(--ink); font-weight: 500; text-align: right; }
    .cmp-spec.best dd { color: var(--gold); }
    .cmp-star { font-size: .7rem; }
    .cmp-view { margin-top: auto; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: .85rem; font-weight: 500; color: var(--ink); border: 1px solid var(--line-strong); padding: 11px; border-radius: 12px; transition: all .15s; }
    .cmp-view:hover { border-color: var(--gold); color: var(--gold); }
    .cmp-view svg { width: 15px; height: 15px; }
    .cmp-add { border: 1.5px dashed var(--line-strong); border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 260px; color: var(--muted); font-size: .88rem; text-align: center; line-height: 1.5; transition: all .15s; }
    .cmp-add:hover { border-color: var(--gold); color: var(--gold); }
    .cmp-add-ic { width: 46px; height: 46px; border-radius: 14px; background: var(--soft); display: grid; place-items: center; }
    .cmp-add-ic svg { width: 22px; height: 22px; }
    .cmp-add:hover .cmp-add-ic { background: var(--gold-soft); }
    @media (max-width: 820px) { .cmp-add { min-height: 140px; flex-direction: row; } }
    .cmp-empty { text-align: center; padding: 68px 20px; }
    .cmp-empty svg { width: 46px; height: 46px; color: var(--gold); }
  </style>
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="page-head">
      <span class="eyebrow-text">Compare</span>
      <h1>เปรียบเทียบทรัพย์</h1>
      <p>ดูข้อมูลเทียบกันแบบเคียงข้าง เลือกทรัพย์ที่ใช่ได้ง่ายขึ้น</p>
    </div>
    <div id="cmpRoot">
      <div class="grid" style="margin-top:24px"><div class="skeleton" style="height:380px"></div></div>
    </div>
    <div style="height:44px"></div>
  </div>

  <div id="footer"></div>

  <script src="/js/shared.js?v=35"></script>
  <script>
    TD.chrome('');

    const $ = id => document.getElementById(id);
    const fmtBaht = n => '฿' + Number(n || 0).toLocaleString();

    function monthly(price, type) {
      if (type !== 'sale' || !price) return null;
      // ประเมินคร่าว: กู้ 90% ดอกเบี้ย 6%/ปี 30 ปี
      const P = price * 0.9, r = 0.06 / 12, n = 360;
      const m = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
      return Math.round(m);
    }

    async function load() {
      let ids = TD.compareList();
      const qs = new URLSearchParams(location.search).get('ids');
      if (qs) ids = qs.split(',').map(Number).filter(Boolean);
      if (!ids.length) return empty();
      let items = [];
      try {
        const r = await fetch('/api/listings-by-ids?ids=' + ids.join(',')).then(x => x.json());
        items = r.items || [];
      } catch {}
      if (!items.length) return empty();
      render(items);
    }

    function empty() {
      $('cmpRoot').innerHTML = `
        <div class="cmp-empty">${TD.icons.compare}
          <h3 style="font-family:var(--font-display);margin:14px 0 6px">ยังไม่ได้เลือกทรัพย์เพื่อเปรียบเทียบ</h3>
          <p style="color:var(--muted)">กดปุ่ม “เทียบ” บนการ์ดประกาศ (เลือกได้สูงสุด 3 รายการ) แล้วกลับมาที่นี่</p>
          <a class="btn btn-primary" href="/search" style="margin-top:18px">ไปเลือกทรัพย์</a>
        </div>`;
    }

    function render(items) {
      const catL = TD._labels.cat[TD.lang()], typeL = TD._labels.type[TD.lang()];
      const num = (v) => Number(v) || 0;
      // แถวข้อมูล: [label, getter, bestPicker]
      const rows = [
        ['ประเภท', l => (typeL[l.listing_type] || '') + ' · ' + (catL[l.category] || '-'), null],
        ['ทำเล', l => l.location_text || l.province || '-', null],
        ['ห้องนอน', l => num(l.bedrooms) ? num(l.bedrooms) + ' ห้อง' : '-', 'max'],
        ['ห้องน้ำ', l => num(l.bathrooms) ? num(l.bathrooms) + ' ห้อง' : '-', 'max'],
        ['พื้นที่ใช้สอย', l => num(l.area_sqm) ? num(l.area_sqm) + ' ตร.ม.' : '-', 'max'],
        ['ขนาดที่ดิน', l => num(l.land_area_sqwah) ? num(l.land_area_sqwah) + ' ตร.ว.' : '-', 'max'],
        ['ผ่อน/เดือน (ประเมิน)', l => { const m = monthly(l.price, l.listing_type); return m ? '~' + fmtBaht(m) : '—'; }, null],
        ['สัตว์เลี้ยง', l => l.pets_allowed ? 'เลี้ยงได้' : 'ไม่อนุญาต', null],
        ['สิ่งอำนวยความสะดวก', l => (l.amenities || []).length + ' รายการ', 'max']
      ];

      // หา index ที่ดีที่สุดของแต่ละแถว
      const bestIdx = rows.map(([, get, mode]) => {
        if (!mode || items.length < 2) return -1;
        const vals = items.map(l => { const n = parseFloat(String(get(l)).replace(/[^\d.]/g, '')); return isNaN(n) ? null : n; });
        const valid = vals.filter(v => v != null);
        if (valid.length < 2) return -1;
        const target = Math.max(...valid);
        if (vals.filter(v => v === target).length === items.length) return -1;
        return vals.indexOf(target);
      });

      const cards = items.map((l, ci) => `
        <article class="cmp-card">
          <div class="cmp-card-media">
            ${(l.images || [])[0] ? `<img src="${TD.esc(l.images[0])}" alt="${TD.esc(l.title)}">` : '<div class="cmp-noimg"></div>'}
            <button class="cmp-rm" data-rm="${l.id}" title="เอาออก" aria-label="เอาออก">✕</button>
            <span class="cmp-badge">${(typeL[l.listing_type] || '')}${catL[l.category] ? ' · ' + catL[l.category] : ''}</span>
          </div>
          <div class="cmp-card-body">
            <h3>${TD.esc(l.title)}</h3>
            <div class="cmp-price">${l.listing_type === 'rent' ? fmtBaht(l.price) + '<span>/เดือน</span>' : fmtBaht(l.price)}</div>
            <dl class="cmp-specs">
              ${rows.map(([label, get], ri) => `
                <div class="cmp-spec ${bestIdx[ri] === ci ? 'best' : ''}">
                  <dt>${label}</dt>
                  <dd>${get(l)}${bestIdx[ri] === ci ? ' <span class="cmp-star">★</span>' : ''}</dd>
                </div>`).join('')}
            </dl>
            <a class="cmp-view" href="/listing/${l.id}">ดูประกาศนี้ ${TD.icons.arrowRight}</a>
          </div>
        </article>`).join('');

      const addSlot = items.length < 3 ? `
        <a class="cmp-add" href="/search">
          <span class="cmp-add-ic">${TD.icons.compare}</span>
          <span>เพิ่มทรัพย์<br>เปรียบเทียบ</span>
        </a>` : '';

      $('cmpRoot').innerHTML = `<div class="cmp-cards">${cards}${addSlot}</div>`;

      $('cmpRoot').querySelectorAll('[data-rm]').forEach(b => b.onclick = () => {
        TD.toggleCompare(b.dataset.rm);
        TD.renderCompareTray();
        load();
      });
    }

    load();
  </script>
</body>
</html>
