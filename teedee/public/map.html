<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var d=document.documentElement,t=localStorage.getItem("yj_theme");d.dataset.theme=t==="dark"?"dark":"light";var l=localStorage.getItem("yj_lang");d.lang=l==="en"?"en":"th";d.dataset.lang=d.lang;}catch(e){}})();</script>
  <title>ค้นหาแบบแผนที่ — อยู่ใจ (yoojai.com)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/style.css?v=55">
  <link rel="icon" href="/favicon">
  <style>
    body { overflow: hidden; }
    .map-page { display: grid; grid-template-columns: 400px 1fr; height: calc(100vh - var(--nav-h, 64px)); }
    .map-list { overflow-y: auto; border-right: 1px solid var(--line); background: var(--bg); -webkit-overflow-scrolling: touch; }
    .map-filters { position: sticky; top: 0; z-index: 5; background: var(--bg); border-bottom: 1px solid var(--line); padding: 14px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .map-filters select { flex: 1; min-width: 0; padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); color: var(--ink-2); font-family: inherit; font-size: var(--fs-xs); outline: none; }
    .map-filters select:focus { border-color: var(--gold); }
    .map-count { padding: 12px 16px 6px; font-size: var(--fs-xs); color: var(--muted); }
    .map-cards { padding: 6px 12px 20px; display: flex; flex-direction: column; gap: 12px; }
    .mc { display: flex; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s; }
    .mc:hover, .mc.active { border-color: var(--gold); box-shadow: var(--shadow-sm); }
    .mc.active { transform: translateY(-1px); }
    .mc-img { width: 116px; flex-shrink: 0; background: var(--soft); object-fit: cover; aspect-ratio: 1; }
    .mc-b { padding: 10px 12px 10px 0; min-width: 0; flex: 1; }
    .mc-price { font-family: var(--font-display); font-weight: 600; color: var(--gold); font-size: 1rem; }
    .mc-price span { font-size: .72rem; color: var(--muted); font-weight: 400; }
    .mc-title { font-size: .84rem; font-weight: 500; margin: 3px 0; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .mc-loc { font-size: .74rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .mc-loc svg { width: 12px; height: 12px; flex-shrink: 0; }
    .mc-spec { font-size: .72rem; color: var(--ink-2); margin-top: 5px; }
    .map-canvas { position: relative; }
    #map { width: 100%; height: 100%; background: var(--soft); z-index: 1; }
    /* price markers */
    .pin { background: #191917; color: #fff; font-family: var(--font-display); font-weight: 600; font-size: 12px; padding: 5px 10px; border-radius: 999px; white-space: nowrap; box-shadow: 0 3px 10px rgba(0,0,0,.3); border: 2px solid #fff; transition: transform .12s; }
    .pin.active, .pin:hover { background: var(--gold); transform: scale(1.12); z-index: 1000 !important; }
    .leaflet-popup-content-wrapper { border-radius: 14px; padding: 0; overflow: hidden; }
    .leaflet-popup-content { margin: 0; width: 220px !important; }
    .pp img { width: 100%; height: 120px; object-fit: cover; display: block; background: var(--soft); }
    .pp-b { padding: 10px 12px 12px; }
    .pp-price { font-family: var(--font-display); font-weight: 600; color: var(--gold); }
    .pp-title { font-size: .82rem; margin: 3px 0 8px; color: #1c1c1a; line-height: 1.35; }
    .pp-link { display: block; text-align: center; background: #191917; color: #fff; padding: 8px; border-radius: 8px; font-size: .8rem; font-weight: 500; }
    .map-empty { padding: 40px 16px; text-align: center; color: var(--muted); font-size: var(--fs-sm); }
    .map-toggle { display: none; }
    @media (max-width: 820px) {
      .map-page { grid-template-columns: 1fr; grid-template-rows: 1fr; position: relative; }
      .map-canvas { position: absolute; inset: 0; }
      .map-list { position: absolute; left: 0; right: 0; bottom: 0; top: 40%; z-index: 10; border-right: 0; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,.15); transition: top .3s ease; }
      .map-list.collapsed { top: calc(100% - 64px); }
      .map-grip { display: flex; justify-content: center; padding: 8px; cursor: pointer; }
      .map-grip::before { content: ''; width: 40px; height: 4px; border-radius: 999px; background: var(--line-strong); }
      .map-filters { top: 20px; }
    }
    @media (min-width: 821px) { .map-grip { display: none; } }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div class="map-page">
    <div class="map-list" id="mapList">
      <div class="map-grip" id="grip"></div>
      <div class="map-filters">
        <select id="fType"><option value="">เช่า + ขาย</option><option value="rent">เช่า</option><option value="sale">ขาย</option></select>
        <select id="fCat"><option value="">ทุกประเภท</option><option value="condo">คอนโด</option><option value="house">บ้านเดี่ยว</option><option value="townhouse">ทาวน์เฮาส์</option><option value="land">ที่ดิน</option><option value="commercial">อาคารพาณิชย์</option></select>
        <select id="fBudget"><option value="">ทุกช่วงราคา</option><option value="0-15000">เช่า ≤ 15,000</option><option value="15000-30000">เช่า 15k–30k</option><option value="0-3000000">ซื้อ ≤ 3 ล้าน</option><option value="3000000-6000000">ซื้อ 3–6 ล้าน</option><option value="6000000-999999999">ซื้อ 6 ล้าน+</option></select>
      </div>
      <div class="map-count" id="mapCount">กำลังโหลด…</div>
      <div class="map-cards" id="mapCards"></div>
    </div>
    <div class="map-canvas"><div id="map"></div></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/shared.js?v=55"></script>
  <script>
    TD.chrome('');
    document.documentElement.style.setProperty('--nav-h', (document.querySelector('.nav')?.offsetHeight || 64) + 'px');

    const $ = id => document.getElementById(id);
    const fmt = n => '฿' + Number(n || 0).toLocaleString();
    const priceLabel = (l) => {
      const p = Number(l.price) || 0;
      if (l.listing_type === 'rent') return p >= 1000 ? '฿' + Math.round(p / 1000) + 'k' : fmt(p);
      return p >= 1e6 ? '฿' + (p / 1e6).toFixed(p % 1e6 ? 1 : 0) + 'M' : fmt(p);
    };

    const dark = document.documentElement.dataset.theme === 'dark';
    if (typeof L === 'undefined') {
      // Leaflet โหลดไม่สำเร็จ (CDN/เน็ตมีปัญหา) — แจ้งผู้ใช้แทนที่จะพังทั้งหน้า
      document.getElementById('map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px;color:var(--muted)">แผนที่โหลดไม่สำเร็จ กรุณารีเฟรชหน้า หรือ <a href="/search" style="color:var(--gold);margin-left:6px"> ค้นหาแบบรายการแทน</a></div>';
      throw new Error('Leaflet unavailable');
    }
    const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([13.7563, 100.5018], 11);
    L.tileLayer(`https://{s}.basemaps.cartocdn.com/${dark ? 'dark_all' : 'light_all'}/{z}/{x}/{y}{r}.png`, {
      attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 20
    }).addTo(map);

    let markers = {}, items = [], activeId = null;

    function criteria() {
      const b = ($('fBudget').value || '').split('-');
      return { type: $('fType').value, category: $('fCat').value, min: b[0] || '', max: b[1] || '' };
    }
    function qs() {
      const c = criteria(); const p = new URLSearchParams();
      Object.entries(c).forEach(([k, v]) => v && p.set(k, v));
      return p.toString();
    }

    async function load() {
      $('mapCount').textContent = 'กำลังโหลด…';
      let data = { items: [] };
      try { data = await fetch('/api/map-listings?' + qs()).then(r => r.json()); } catch {}
      items = data.items || [];
      // clear markers
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};
      if (!items.length) { $('mapCards').innerHTML = '<div class="map-empty">ไม่พบทรัพย์ที่มีพิกัดในเงื่อนไขนี้</div>'; $('mapCount').textContent = 'ไม่พบทรัพย์'; return; }

      const bounds = [];
      items.forEach(l => {
        const lat = Number(l.latitude), lng = Number(l.longitude);
        if (!lat || !lng) return;
        bounds.push([lat, lng]);
        const icon = L.divIcon({ className: '', html: `<div class="pin" data-pin="${l.id}">${priceLabel(l)}</div>`, iconSize: null });
        const m = L.marker([lat, lng], { icon }).addTo(map);
        m.on('click', () => { openPopup(l); focusCard(l.id); });
        markers[l.id] = m;
      });
      if (bounds.length) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
      renderList();
      map.off('moveend', renderList); map.on('moveend', renderList);
    }

    function inView(l) {
      const lat = Number(l.latitude), lng = Number(l.longitude);
      return lat && lng && map.getBounds().contains([lat, lng]);
    }
    function renderList() {
      const vis = items.filter(inView);
      $('mapCount').textContent = `${vis.length} ทรัพย์ในพื้นที่นี้`;
      $('mapCards').innerHTML = vis.map(l => `
        <div class="mc" data-card="${l.id}">
          <img class="mc-img" src="${TD.esc(l.image || '')}" alt="" onerror="this.style.visibility='hidden'">
          <div class="mc-b">
            <div class="mc-price">${l.listing_type === 'rent' ? fmt(l.price) + '<span>/เดือน</span>' : fmt(l.price)}</div>
            <div class="mc-title">${TD.esc(l.title)}</div>
            <div class="mc-loc">${TD.icons.pin} ${TD.esc(l.location_text || '-')}</div>
            <div class="mc-spec">${[l.bedrooms ? l.bedrooms + ' นอน' : '', l.bathrooms ? l.bathrooms + ' น้ำ' : '', Number(l.area_sqm) ? Number(l.area_sqm) + ' ตร.ม.' : ''].filter(Boolean).join(' · ')}</div>
          </div>
        </div>`).join('') || '<div class="map-empty">เลื่อนแผนที่เพื่อดูทรัพย์ในพื้นที่อื่น</div>';

      $('mapCards').querySelectorAll('[data-card]').forEach(c => {
        const id = Number(c.dataset.card);
        c.onclick = () => { const l = items.find(x => x.id === id); if (l) { map.setView([l.latitude, l.longitude], Math.max(map.getZoom(), 14)); openPopup(l); focusCard(id); } };
        c.onmouseenter = () => setActive(id, true);
        c.onmouseleave = () => setActive(id, false);
      });
    }

    function setActive(id, on) {
      const pin = document.querySelector(`.pin[data-pin="${id}"]`);
      if (pin) pin.classList.toggle('active', on);
    }
    function focusCard(id) {
      activeId = id;
      document.querySelectorAll('.mc').forEach(c => c.classList.toggle('active', Number(c.dataset.card) === id));
      const el = document.querySelector(`.mc[data-card="${id}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function openPopup(l) {
      L.popup({ closeButton: true, offset: [0, -6] })
        .setLatLng([l.latitude, l.longitude])
        .setContent(`<div class="pp">
          ${l.image ? `<img src="${TD.esc(l.image)}" alt="">` : ''}
          <div class="pp-b">
            <div class="pp-price">${l.listing_type === 'rent' ? fmt(l.price) + '/เดือน' : fmt(l.price)}</div>
            <div class="pp-title">${TD.esc(l.title)}</div>
            <a class="pp-link" href="/listing/${l.id}">ดูรายละเอียด</a>
          </div></div>`)
        .openOn(map);
    }

    ['fType', 'fCat', 'fBudget'].forEach(id => $(id).addEventListener('change', load));

    // mobile bottom-sheet toggle
    $('grip').onclick = () => $('mapList').classList.toggle('collapsed');

    load();
  </script>
</body>
</html>
